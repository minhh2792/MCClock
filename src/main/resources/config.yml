# https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
timezone: "Asia/Ho_Chi_Minh"

# Clock face image file (placed in plugins/MCClock/ folder)
clock-face: "clock_face_1.png"

item:
  name: "&bClock"
  lore:
    - "&7An analog clock."

hands:
  # Thickness of the clock hands
  # Recommended values: 1-2
  thickness: 3

  # smooth: second hand moves continuously between ticks
  # tick: second hand jumps once per second
  mode: tick

  # Compensation in milliseconds for network latency (try 500-1000 if clock appears behind)
  # Example: 1000 = 1 second
  latency-compensation-ms: 500

tick-sound:
  # Play a tick sound near invisible item frames that contain the clock map
  enabled: true
  # Radius in blocks to hear the sound
  radius: 5.0
  # Volume (0.0 - 1.0)
  volume: 0.3
  # Pitch
  pitch: 2.0
  # Sound name — see https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Sound.html
  sound: "BLOCK_NOTE_BLOCK_HAT"

# DON'T CHANGE THIS
map-id: -1